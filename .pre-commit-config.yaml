#
# Pre-commit hooks for harness-oss.
# Deliberately omits SPDX-header enforcement — owned by a separate W2 agent.
# Run `pre-commit install` once after cloning.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        files: ^python/.*\.py$
      - id: ruff-format
        files: ^python/.*\.py$

  - repo: local
    hooks:
      - id: drift-check
        name: codegen drift-check
        description: >-
          Fail if committed `_generated/` outputs no longer match `tools/codegen/`
          run against `schemas/`. Triggers only on changes to schemas/, the
          codegen tool itself, or any `_generated/` directory.
        entry: bash tools/drift_check.sh
        language: system
        pass_filenames: false
        files: ^(schemas/.*|tools/codegen/.*|.*_generated/.*)$

      - id: rustfmt-check
        name: cargo fmt --check
        description: Verify Rust formatting without modifying files.
        entry: bash -c 'cargo fmt --all -- --check'
        language: system
        pass_filenames: false
        files: ^crates/.*\.rs$
