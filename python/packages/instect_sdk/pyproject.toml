[project]
name = "instect-sdk"
version = "0.1.0a0"
description = "Python SDK for defining and running Insect evaluations."
requires-python = ">=3.12"
dependencies = [
    "instect-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
instect-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/instect_sdk"]
