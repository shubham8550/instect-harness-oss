#
# codegen-drift.yml — fail PRs where committed `_generated/` outputs no longer
# match a fresh run of the codegen pipeline against `schemas/`.
#
# Job name `drift-check` is referenced by branch-protection required-status-checks.

name: codegen-drift

on:
  pull_request:
    paths:
      - "schemas/**"
      - "tools/codegen/**"
      - "tools/drift_check.sh"
      - "**/_generated/**"
      - ".github/workflows/codegen-drift.yml"
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "tools/codegen/**"
      - "tools/drift_check.sh"
      - "**/_generated/**"

concurrency:
  group: codegen-drift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift-check:
    name: drift-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v5.4.1
        with:
          version: "0.5.7"

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: "9.13.0"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable

      - name: Cache cargo bin (typify-cli)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-typify-${{ runner.os }}-v1

      - name: Install typify-cli
        run: |
          if ! command -v typify >/dev/null 2>&1; then
            cargo install typify-cli --locked
          fi

      - name: Install codegen Python deps
        run: uv pip install --system -r tools/codegen/requirements.txt

      - name: Run drift-check
        env:
          PY: python
        run: bash tools/drift_check.sh
